<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预习lv2</title>
    <style>
        div {
            background-color: #87CEEB;
            position: relative;
            top: 180px;
            left: 450px;
            height: 320px;
            width: 600px;
        }

        .hufa {
            background-color: #71B4EB;
            border-radius: 20px;
            display: inline-block;
            height: 80px;
            width: 220px;
        }

        .yuan {
            text-align: center;
            position: relative;
            left: 150px;
            background-color: #03A9F4;
            border-radius: 20px;
            display: inline-block;
            height: 100px;
            width: 300px;
        }

        span {
            height: 100px;
            text-align: 100px;
        }

        p {
            text-align: center;
        }
    </style>
</head>

<body>
    <div>
        <h2 style="text-align: center;">我是h2，还跑到中间来了哟</h2>
        <span class="yuan">
            <p style="position: relative; top: 20px;">我不仅垂直居中我的框框还是圆角的</p>
        </span>
        <p style="line-height :10px; text-align: center;">上面的圆角框大小是300px*100px而且我的上下都相距20px哦</p>
        <table>
            <tr>
                <td><span class="hufa">
                        <p style="position: relative; top: 10px;">我是220x80px的左护法</p>
                    </span></td>
                <td><span>
                        <p>整个蓝色大框是600pxx320px的</p>
                    </span></td>
                <td><span class="hufa">
                        <p style="position: relative; top: 10px;">我是220pxx80px的右护法</p>
                    </span></td>
            </tr>
        </table>
    </div>

</body>

</html>
